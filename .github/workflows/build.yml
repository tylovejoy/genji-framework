name: Compile and Upload Overwatch Script

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main]  # Or your test branch

jobs:
  compile-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install OverPy CLI
        run: npm install -g overpy

      - name: Compile .opy script to .ow
        run: |
          mkdir -p dist
          overpy compile -i framework.opy -o dist/framework.ow -l en-US

      - name: Upload compiled .ow files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-overpy
          path: "dist/*.ow"

      - name: Upload compiled files to release (only on release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: "dist/*.ow"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
